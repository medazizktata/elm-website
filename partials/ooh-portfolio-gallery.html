<section class="content-section section-compact">
  <div class="container">
    <div class="section-title text-left">
      <h6>PORTFOLIO</h6>
      <h2>OOH Media Concepts</h2>
      <p>Sculptural digital displays engineered for luxury retail, automotive and premium brand activations across the UAE.</p>
    </div>

    <div class="row">
      <div class="col-lg-6">
        <figure class="project-box">
          <img src="images/projects/oval-digital-billboard/hero.jpg" alt="Oval Digital Billboard — THE LOOP kinetic OOH concept" width="800" height="600" loading="lazy">
          <figcaption><h5>Oval Digital Billboard</h5><p>THE LOOP — aerodynamic dual-screen OOH with programmable LED surfaces</p></figcaption>
        </figure>
      </div>
      <div class="col-lg-6">
        <figure class="project-box">
          <img src="images/projects/dubai-eagle/hero.jpg" alt="Dubai Eagle winged OOH installation" width="800" height="600" loading="lazy">
          <figcaption><h5>Dubai Eagle</h5><p>Winged digital sculpture for high-impact automotive and luxury brand campaigns</p></figcaption>
        </figure>
      </div>
      <div class="col-lg-6">
        <figure class="project-box">
          <img src="images/projects/the-flouka/hero.jpg" alt="The Flouka creative OOH monument" width="800" height="600" loading="lazy">
          <figcaption><h5>The Flouka</h5><p>Gold crescent monument with integrated display for cultural and retail destinations</p></figcaption>
        </figure>
      </div>
      <div class="col-lg-6">
        <figure class="project-box">
          <img src="images/projects/dubai-watch/hero.jpg" alt="Dubai Watch luxury retail OOH display" width="800" height="600" loading="lazy">
          <figcaption><h5>Dubai Watch</h5><p>Sculptural teardrop kiosk for premium watch and jewellery retail environments</p></figcaption>
        </figure>
      </div>
    </div>

    <div class="swiper-container project-slider section-compact">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/oval-digital-billboard/display.jpg" alt="Oval Digital Billboard display detail" loading="lazy"></figure>
        </div>
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/dubai-eagle/front.jpg" alt="Dubai Eagle front view" loading="lazy"></figure>
        </div>
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/the-flouka/side.jpg" alt="The Flouka side elevation" loading="lazy"></figure>
        </div>
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/dubai-watch/front.jpg" alt="Dubai Watch front perspective" loading="lazy"></figure>
        </div>
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/oval-digital-billboard/concept.jpg" alt="Oval Digital Billboard concept render" loading="lazy"></figure>
        </div>
        <div class="swiper-slide">
          <figure class="project-box"><img src="images/projects/dubai-eagle/detail.jpg" alt="Dubai Eagle detail render" loading="lazy"></figure>
        </div>
      </div>
      {{> project-slider-controls}}
    </div>
  </div>
</section>
