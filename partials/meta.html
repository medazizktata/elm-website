<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
<meta name="theme-color" content="#BD1F71"/>
<title>{{documentTitle pageTitle}}</title>
<meta name="application-name" content="{{siteName}}">
<meta name="author" content="{{siteName}}">
<meta name="description" content="{{description}}">
<meta name="robots" content="{{#if noindex}}noindex, follow{{else}}index, follow{{/if}}">

<meta property="og:title" content="{{documentTitle pageTitle}}">
<meta property="og:description" content="{{description}}">
<meta property="og:site_name" content="{{siteName}}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.elmmdesign.com/{{ogPath}}">
<meta property="og:image" content="https://www.elmmdesign.com/images/logo.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{documentTitle pageTitle}}">
<meta name="twitter:description" content="{{description}}">
<meta name="twitter:image" content="https://www.elmmdesign.com/images/logo.png">

<link rel="canonical" href="https://www.elmmdesign.com/{{ogPath}}">
{{> theme-init}}
